baseurl = "https://forpetswithlove.netlify.app/"
disableLanguages = ["fr"]
googleAnalytics = "G-GW45MT4LE0"
summarylength = "20"
theme = "vex-hugo"
title = "For Pets With Love! Everything you want for your pet's needs."


# Add outputs for proper sitemap generation (updated) 
[outputs]
home = ["HTML", "RSS", "JSON"]
search = ["HTML"]

[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

[Languages.en]
contentDir = "content/english"
copyright = "©2026, Forpetswithlove. All Rights Reserved. When you buy through links on our site, we may earn a commission."
languageCode = "en-us"
languageName = "En"
weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  
  # Added for better content structure
  [markup.tableOfContents]
    endLevel = 4
    ordered = false
    startLevel = 2

[menu]
[[menu.main]]
  name = "Blog"
  url = "/blog/"
  weight = 1
[[menu.main]]
  name = "Cat Care"
  url = "/blog/categories/cat-care/"
  weight = 2
[[menu.main]]
  name = "Dog Care"
  url = "/blog/categories/dog-care/"
  weight = 3
[[menu.main]]
  name = "Ebook"
  url = "/cat-scratching-solution-ebook/"
  weight = 4
[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 5

[params]
  author = "|Kweebs"
  contact_form_action = "#"
  currency = "$"
  description = "Welcome to ForPetsWithLove.com, your one-stop shop for all things pet-related! We are a passionate team of pet lovers who are dedicated to providing you with the best products and services for your furry friends."
  logo = "images/logo.png"
  logo_width = "200px"
  search = true
  search_minify = false

  # Ebook Configuration
  [params.ebook]
    title = "The Cat Scratching Solution: From Furniture Destroyer to Happy Scratcher"
    author = "Jane Doe"
    price = "19.99"
    currency = "USD"
    purchase_url = "https://books2read.com/u/47jzOq"
    guarantee_days = "30"
    reader_count = "2,500+"
    
  # Kit.com (ConvertKit) Configuration
  # Replace with your actual Kit.com credentials
  kit_username = ""  # Your Kit.com username
  kit_form_id = ""  # Your newsletter form ID
  kit_api_key = ""  # Your ConvertKit API key (for integrations)
    
  # Lead Magnet Configuration
  [params.leadmagnet]
    title = "Free Cat Scratching Prevention Checklist"
    description = "10-point checklist to prevent scratching problems before they start"
    format = "PDF"

# Added SEO parameters
use_proper_headings = true
enable_breadcrumbs = true
images = ["images/logo.png"]  # For social sharing

[[params.plugins.css]]
link = "https://fonts.googleapis.com/css?family=Droid+Serif:400|Josefin+Sans:300,400,600,700"
[[params.plugins.css]]
link = "plugins/bootstrap/bootstrap.min.css"
[[params.plugins.css]]
link = "plugins/themefisher-font/themefisher-font.min.css"
[[params.plugins.css]]
link = "plugins/slick/slick.min.css"
[[params.plugins.js]]
link = "plugins/jquery/jquery.js"
[[params.plugins.js]]
link = "plugins/bootstrap/bootstrap.min.js"
[[params.plugins.js]]
link = "plugins/slick/slick.min.js"

[params.preloader]
enable = false
preloader = ""

# Improved permalinks for better URL structure
[permalinks]
blog = "/:filename/"

# Added taxonomies for better content organization
[taxonomies]
  category = "categories"
  tag = "tags"

# Added privacy settings for GDPR compliance
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    anonymizeIP = true
    disable = false
    respectDoNotTrack = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true
    privacyEnhanced = true